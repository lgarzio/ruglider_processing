  source: Observational data from a profiling glider.
  standard_name_vocabulary: CF Standard Name Table v27
  summary: The project supports the assessment and development of an open ocean seaweed
    farming demonstration facility near Cebu City, Philippines. The project will provide
    a framework for assessing the potential to increase carbon dioxide sequestration
    in the ocean. Assessing the seaweed farm potential will require the capability
    for assessing the biogeochemical impacts associated with the seaweed farm and
    the corresponding environmental footprint on the regional systems. The glider
    will be deployed in an ocean monitoring program to sample the oceanographic and
    ecological parameters, providing a baseline dataset to inform potential environmental
    impacts of seaweed farms. The goal is for sustained spatial sampling around the
    seaweed farm to map both the upstream and downstream conditions. The glider is
    equipped with a Seabird CTD, a WETLabs FLBBCD ECO puck configured for simultaneous
    chlorophyll fluorescence, colored dissolved organic matter, and optical backscatter
    measurements, an Aanderaa Optode for measuring dissolved oxygen, and a Seabird
    SUNA for measuring nitrate concentrations.
